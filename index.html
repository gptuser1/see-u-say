<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>see-u-say · Text-to-Image</title>
  <meta name="description" content="基于 FLUX.2 klein 4B 的文生图应用" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="26" height="26" fill="none">
            <circle cx="13" cy="13" r="8" stroke="currentColor" stroke-width="2.2"/>
            <path d="M19 19l7 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand__text">see<span class="brand__dash">·</span>u<span class="brand__dash">·</span>say</span>
      </a>

      <div class="topbar__right">
        <input id="token-input" class="input token-input mono" type="password" placeholder="访问令牌" autocomplete="off" title="输入访问令牌" />
        <div class="theme-toggle" role="group" aria-label="主题切换">
          <button class="theme-toggle__btn" data-theme-set="light" title="亮色" aria-label="亮色主题">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
          <button class="theme-toggle__btn" data-theme-set="auto" title="跟随系统" aria-label="自动跟随系统主题">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8M12 18v3"/></svg>
          </button>
          <button class="theme-toggle__btn" data-theme-set="dark" title="暗色" aria-label="暗色主题">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="hero__title">把文字<span class="accent">变成</span>画面</h1>
      <p class="hero__sub">FLUX.2 klein 4B · 上传参考图，输入提示词，即时生成画面。</p>
    </section>

    <!-- 输入卡 -->
    <section class="card" id="input-card">
      <div class="card__head">
        <h2 class="card__title"><span class="card__num">01</span>提示词</h2>
      </div>

      <label class="field-label" for="prompt">Prompt</label>
      <textarea id="prompt" class="textarea mono" rows="5" placeholder="描述你想生成的画面，越具体越好…"></textarea>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label" for="width">输出宽度</label>
          <input id="width" class="input" type="number" value="1024" min="256" max="1920" step="64" />
        </div>
        <div class="field-group">
          <label class="field-label" for="height">输出高度</label>
          <input id="height" class="input" type="number" value="768" min="256" max="1920" step="64" />
        </div>
        <div class="size-presets">
          <button class="chip" data-w="1024" data-h="768">1024×768</button>
          <button class="chip" data-w="768" data-h="1024">768×1024</button>
          <button class="chip" data-w="1024" data-h="1024">1024×1024</button>
        </div>
      </div>
      <p class="hint" id="size-hint">宽高须为 64 的倍数，范围 256–1920。</p>

      <label class="field-label">参考图 <span class="muted">（最多 4 张，自动缩放至 ≤512×512，保持比例）</span></label>
      <div class="refs" id="refs">
        <label class="ref-slot" data-slot="0">
          <input type="file" accept="image/png,image/jpeg,image/webp" hidden />
          <span class="ref-slot__plus">+</span>
          <span class="ref-slot__label">添加</span>
        </label>
        <label class="ref-slot" data-slot="1">
          <input type="file" accept="image/png,image/jpeg,image/webp" hidden />
          <span class="ref-slot__plus">+</span>
          <span class="ref-slot__label">添加</span>
        </label>
        <label class="ref-slot" data-slot="2">
          <input type="file" accept="image/png,image/jpeg,image/webp" hidden />
          <span class="ref-slot__plus">+</span>
          <span class="ref-slot__label">添加</span>
        </label>
        <label class="ref-slot" data-slot="3">
          <input type="file" accept="image/png,image/jpeg,image/webp" hidden />
          <span class="ref-slot__plus">+</span>
          <span class="ref-slot__label">添加</span>
        </label>
      </div>

      <button id="generate-btn" class="btn btn--primary btn--block">
        <span class="btn__label">生成图片</span>
      </button>
    </section>

    <!-- 提示词优化卡 -->
    <section class="card" id="optimize-card">
      <div class="card__head">
        <h2 class="card__title"><span class="card__num">02</span>提示词优化</h2>
        <label class="switch">
          <input type="checkbox" id="optimize-toggle" />
          <span class="switch__track"><span class="switch__thumb"></span></span>
        </label>
      </div>

      <div class="optimize-body" id="optimize-body" hidden>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="provider-select">提供商</label>
            <select id="provider-select" class="select" disabled></select>
          </div>
          <div class="field-group">
            <label class="field-label" for="model-select">模型</label>
            <select id="model-select" class="select" disabled></select>
          </div>
        </div>

        <label class="field-label" for="optimize-rule">优化规则 <span class="muted">（作为 system prompt）</span></label>
        <textarea id="optimize-rule" class="textarea" rows="3" placeholder="例如：把用户描述改写为英文，具体可视化，控制在 80 词以内…"></textarea>

        <div class="params">
          <label class="param">
            <span class="param__label">思考模式</span>
            <label class="switch switch--sm">
              <input type="checkbox" id="thinking-toggle" />
              <span class="switch__track"><span class="switch__thumb"></span></span>
            </label>
          </label>
          <label class="param">
            <span class="param__label">temperature</span>
            <input id="temperature" class="input input--sm" type="number" value="0.5" min="0" max="2" step="0.1" />
          </label>
          <label class="param">
            <span class="param__label">top_p</span>
            <input id="top-p" class="input input--sm" type="number" value="0.9" min="0" max="1" step="0.05" />
          </label>
          <label class="param">
            <span class="param__label">max_tokens</span>
            <input id="max-tokens" class="input input--sm" type="number" value="2048" min="1" step="1" />
          </label>
        </div>

        <button id="optimize-btn" class="btn btn--ghost btn--block" disabled>优化提示词</button>

        <div class="optimize-result" id="optimize-result" hidden>
          <label class="field-label">优化结果</label>
          <textarea id="optimized-prompt" class="textarea mono" rows="5" readonly></textarea>
          <div class="btn-row">
            <button id="reoptimize-btn" class="btn btn--ghost">重新生成</button>
            <button id="confirm-prompt-btn" class="btn btn--primary">确认传入</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 结果卡 -->
    <section class="card" id="result-card">
      <div class="card__head">
        <h2 class="card__title"><span class="card__num">03</span>生成结果</h2>
      </div>
      <div class="result-area" id="result-area">
        <div class="result-empty" id="result-empty">
          <svg viewBox="0 0 48 48" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"><rect x="6" y="9" width="36" height="30" rx="3"/><circle cx="17" cy="20" r="3"/><path d="M6 33l10-9 6 5 8-8 12 12"/></svg>
          <p>生成的图片会出现在这里</p>
        </div>
        <div class="result-loading" id="result-loading" hidden>
          <div class="spinner"></div>
          <p class="mono" id="loading-text">正在生成…</p>
        </div>
        <div class="result-error" id="result-error" hidden>
          <p class="result-error__msg" id="error-msg"></p>
        </div>
        <figure class="result-figure" id="result-figure" hidden>
          <img id="result-image" alt="生成结果" />
          <figcaption class="result-meta mono" id="result-meta"></figcaption>
        </figure>
      </div>
    </section>

    <footer class="footer">
      <p class="mono">see-u-say · powered by FLUX.2 klein 4B on Cloudflare Workers AI</p>
    </footer>
  </main>

  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/image-utils.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
